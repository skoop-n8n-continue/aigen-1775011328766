<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        :root {
            --primary: #00b7af;
            --dark: #10181f;
            --light: #ffffff;
            --secondary: #6a7071;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 2rem;
            color: var(--primary);
        }
        .image-container {
            width: 80%;
            max-width: 600px;
            aspect-ratio: 16 / 9;
            background-color: var(--secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .loading {
            font-style: italic;
            color: var(--secondary);
        }
    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <div class="image-container" id="imageContainer">
        <img src="assets/image.png?v=a1b2c3" alt="Futuristic City">
    </div>

    <script src="script.js?v=a1b2c3"></script>
</body>
</html>
